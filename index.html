<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scenario 7 vs 7a Boundary Comparison</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}h1{font-size:1.6em;margin-bottom:4px;color:#fff}.subtitle{font-size:.95em;color:#aaa;margin-bottom:16px}.comparison-container{position:relative;width:900px;max-width:95vw;aspect-ratio:1220/1020;overflow:hidden;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.5);cursor:ew-resize;user-select:none}.comparison-container img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;pointer-events:none}.img-right{z-index:1}.img-left{z-index:2;clip-path:inset(0 50% 0 0)}.slider-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.6);z-index:10;left:50%;transform:translateX(-50%);pointer-events:none}.slider-handle{display:none}.label{position:absolute;top:12px;z-index:15;background:rgba(0,0,0,.8);color:#fff;padding:8px 16px;border-radius:4px;font-size:.9em;font-weight:600;pointer-events:none;line-height:1.4}.label-left{left:12px}.label-right{right:12px}.label small{display:block;font-weight:400;font-size:.8em;color:#bbb}
</style>
</head>
<body>
<h1>Scenario 7 vs 7a</h1>
<p class="subtitle">Drag the slider to compare how the boundary shifted between March 19 and March 31</p>
<div class="comparison-container" id="container"><img class="img-right" src="img7a.png" alt="Scenario 7a"><img class="img-left" id="imgLeft" src="img7.png" alt="Scenario 7"><div class="slider-line" id="sliderLine"></div><div class="slider-handle" id="sliderHandle"><svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"><polyline points="8,4 4,12 8,20"></polyline><polyline points="16,4 20,12 16,20"></polyline></svg></div><div class="label label-left">Scenario 7<small>March 19 - Blanchard at 97% (6a)</small></div><div class="label label-right">Scenario 7a<small>March 31 - Blanchard at 99%</small></div></div>
<script>const c=document.getElementById('container'),il=document.getElementById('imgLeft'),sl=document.getElementById('sliderLine'),sh=document.getElementById('sliderHandle');let d=false;function u(x){const r=c.getBoundingClientRect();let p=(x-r.left)/r.width;p=Math.max(.02,Math.min(.98,p));const pct=p*100;il.style.clipPath='inset(0 '+(100-pct)+'% 0 0)';sl.style.left=pct+'%';sh.style.left=pct+'%'}c.addEventListener('mousedown',e=>{d=true;u(e.clientX)});window.addEventListener('mousemove',e=>{if(d)u(e.clientX)});window.addEventListener('mouseup',()=>{d=false});c.addEventListener('touchstart',e=>{d=true;u(e.touches[0].clientX)},{passive:true});window.addEventListener('touchmove',e=>{if(d)u(e.touches[0].clientX)},{passive:true});window.addEventListener('touchend',()=>{d=false})</script>
</body>
</html>
